spring:
  application:
    name: jobtracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: ${DB_USERNAME:jobtracker}
    password: ${DB_PASSWORD:jobtracker_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework: INFO
    com.dhaval.jobtracker: DEBUG