spring:
  application:
    name: jobtracker

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration


  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: ${DB_USERNAME:jobtracker}
    password: ${DB_PASSWORD:jobtracker_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework: INFO
    com.dhaval.jobtracker: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-use-a-long-random-string-in-production-at-least-32-bytes-abc123def456}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}